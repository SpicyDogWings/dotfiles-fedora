theme = "base16_terminal"

[editor]
shell = ["fish", "-c"]
line-number = "relative"
cursorline = true
auto-format = false
bufferline = "multiple"
color-modes = true
end-of-line-diagnostics = "hint"

[editor.statusline]
mode.normal = "NAVEGACIÓN"
mode.insert = "ESCRITURA"
mode.select = "SELECIÓN"

[editor.cursor-shape]
normal = "bar"
insert = "underline"

[editor.indent-guides]
render = true
character = "╎"
skip-levels = 1

[editor.smart-tab]
enable = false

[editor.inline-diagnostics]
cursor-line = "warning"

[keys.normal]
C-y = [
  ':sh rm -f /tmp/unique-file',
  ':insert-output yazi "%{buffer_name}" --chooser-file=/tmp/unique-file',
  ':sh printf "\x1b[?1049h\x1b[?2004h" > /dev/tty',
  ':open %sh{cat /tmp/unique-file}',
  ':redraw',
]
