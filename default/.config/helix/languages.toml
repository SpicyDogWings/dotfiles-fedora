[[language]]
name = "html"
formatter = { command = "oxfmt", args = ["--stdin-filepath", "stdin.html"] }
language-servers = ["vscode-html-languageserver"]
auto-format = true
[language-server.vscode-html-languageserver]
command = "vscode-html-languageserver"
args = ["--stdio"]

[[language]]
name = "css"
formatter = { command = "oxfmt", args = ["--stdin-filepath", "stdin.html"] }
language-servers = ["vscode-css-languageserver"]
auto-format = true
[language-server.vscode-css-languageserver]
command = "vscode-css-languageserver"
args = ["--stdio"]

[[language]]
name = "vue"
formatter = { command = "oxfmt", args = ["--stdin-filepath", "stdin.html"] }
scope = "source.vue"
injection-regex = "vue"
file-types = ["vue"]
language-servers = ["volar", "oxlint"]

[language-server.volar]
command = "vue-language-server"
args = ["--stdio"]


[language-server.tailwindcss-language-server]
command = "tailwindcss-language-server"
args = ["--stdio"]

[language-server.emmet-lsp]
command = "emmet-ls"
args = ["--stdio"]
